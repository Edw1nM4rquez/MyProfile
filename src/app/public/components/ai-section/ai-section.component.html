<!-- AI Section — Dark Tech Portfolio -->
<section id="ai" class="bg-[#0B0F19] py-24 relative overflow-hidden">

  <!-- Purple glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[400px] bg-purple-600/5 rounded-full blur-3xl pointer-events-none"></div>

  <div class="max-w-6xl mx-auto px-6 lg:px-8 relative">

    <!-- Header -->
    <div class="mb-16" appFadeIn>
      <div class="flex items-center gap-3 mb-4">
        <span class="text-purple-400 text-xs font-bold uppercase tracking-widest">{{ lang.t('ai.label') }}</span>
        <div class="flex-1 h-px bg-gray-800 max-w-16"></div>
      </div>
      <h2 class="text-4xl lg:text-5xl font-bold text-gray-100 tracking-tight mb-4">
        {{ lang.t('ai.title') }}
      </h2>
      <p class="text-gray-400 text-lg max-w-2xl">
        {{ lang.t('ai.subtitle') }}
      </p>
    </div>

    <!-- Cards 2×2 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
      <div
        *ngFor="let card of cards"
        appFadeIn
        [class]="'group rounded-2xl border bg-gray-900/40 p-7 transition-all duration-300 hover:bg-gray-900/70 ' + colorClasses[card.color].border">

        <!-- Icon -->
        <div [class]="'w-11 h-11 rounded-xl flex items-center justify-center mb-5 border ' + colorClasses[card.color].bg + ' ' + colorClasses[card.color].border">
          <svg [class]="'w-5 h-5 ' + colorClasses[card.color].icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="iconPaths[card.icon]"/>
          </svg>
        </div>

        <h3 class="text-gray-100 font-bold text-lg mb-3 group-hover:text-white transition-colors">
          {{ lang.t('ai.' + card.cKey + '_title') }}
        </h3>
        <p class="text-gray-400 text-sm leading-relaxed">
          {{ lang.t('ai.' + card.cKey + '_desc') }}
        </p>
      </div>
    </div>

    <!-- Real case callout -->
    <div appFadeIn class="rounded-2xl border border-purple-500/20 bg-purple-500/5 p-7 flex flex-col sm:flex-row gap-5 items-start">
      <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-purple-500/20 border border-purple-500/30 flex items-center justify-center">
        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <p class="text-purple-300 text-xs font-bold uppercase tracking-widest mb-2">
          {{ lang.t('ai.case_label') }}
        </p>
        <p class="text-gray-300 text-sm leading-relaxed">
          {{ lang.t('ai.case_text') }}
        </p>
      </div>
    </div>

    <!-- Tech pills row -->
    <div appFadeIn class="flex flex-wrap gap-2.5 mt-8">
      <span *ngFor="let tech of ['OpenAI', 'Gemini', 'Hugging Face', 'Python', 'scikit-learn', 'LangChain', 'Power BI', 'REST AI APIs']"
        class="text-xs px-3 py-1.5 rounded-full border border-purple-500/20 bg-purple-500/5 text-purple-300 font-mono">
        {{ tech }}
      </span>
    </div>
  </div>
</section>

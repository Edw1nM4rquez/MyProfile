<!-- Contact Section — Light Tech Portfolio -->
<section id="contact" class="bg-gray-50 py-24 relative overflow-hidden">

  <!-- Blue glow bottom-center -->
  <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[500px] h-[300px] bg-blue-50 rounded-full blur-3xl pointer-events-none"></div>

  <div class="max-w-4xl mx-auto px-6 lg:px-8 relative">

    <!-- Big CTA block -->
    <div appFadeIn class="text-center mb-16">
      <div class="flex items-center justify-center gap-3 mb-6">
        <span class="text-blue-600 text-xs font-bold uppercase tracking-widest">{{ lang.t('contact.label') }}</span>
      </div>

      <h2 class="text-4xl lg:text-6xl font-bold text-gray-900 tracking-tight leading-tight mb-6 whitespace-pre-line">
        {{ lang.t('contact.title') }}
      </h2>

      <p class="text-gray-600 text-lg max-w-xl mx-auto mb-10">
        {{ lang.t('contact.subtitle') }}
      </p>

      <!-- Available badge -->
      <div class="inline-flex items-center gap-2.5 px-5 py-2.5 rounded-full border border-green-200 bg-green-50 mb-10">
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        <span class="text-green-600 text-sm font-semibold">{{ lang.t('contact.available') }}</span>
      </div>

      <!-- Primary CTA -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <a [href]="'mailto:' + contactInfo.email"
          class="inline-flex items-center gap-2.5 px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-blue-600/25 hover:-translate-y-0.5 text-base">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          {{ lang.t('contact.send_email') }}
        </a>
        <a [href]="contactInfo.linkedin" target="_blank" rel="noopener"
          class="inline-flex items-center gap-2.5 px-8 py-4 text-gray-700 hover:text-gray-900 border border-gray-300 hover:border-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-gray-50 text-base">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
          </svg>
          LinkedIn
        </a>
      </div>
    </div>

    <!-- Info row -->
    <div appFadeIn class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <a [href]="'mailto:' + contactInfo.email"
        class="flex items-center gap-3 p-4 rounded-xl border border-gray-200 bg-white hover:border-gray-300 transition-colors group">
        <div class="w-9 h-9 rounded-lg bg-blue-50 border border-blue-200 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <span class="text-gray-600 text-sm group-hover:text-gray-800 transition-colors truncate">{{ contactInfo.email }}</span>
      </a>

      <a [href]="contactInfo.github" target="_blank" rel="noopener"
        class="flex items-center gap-3 p-4 rounded-xl border border-gray-200 bg-white hover:border-gray-300 transition-colors group">
        <div class="w-9 h-9 rounded-lg bg-gray-100 border border-gray-200 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-gray-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </div>
        <span class="text-gray-600 text-sm group-hover:text-gray-800 transition-colors">Edw1nM4rquez</span>
      </a>

      <div class="flex items-center gap-3 p-4 rounded-xl border border-gray-200 bg-white">
        <div class="w-9 h-9 rounded-lg bg-gray-100 border border-gray-200 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <span class="text-gray-600 text-sm">{{ contactInfo.location }}</span>
      </div>
    </div>
  </div>
</section>

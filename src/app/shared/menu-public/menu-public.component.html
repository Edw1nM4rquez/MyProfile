<!-- Navigation — dark bar aligned with hero / portfolio vibe -->
<nav
  class="fixed top-10 left-0 right-0 z-50 border-b border-white/10 bg-slate-950/90 backdrop-blur-xl shadow-lg shadow-black/20 transition-colors duration-300">
  <div class="max-w-6xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Wordmark (Syne / display — not the same script as reference sites) -->
      <button (click)="scrollTo('')" class="flex items-center gap-3 group text-left" type="button">
        <span
          class="font-display text-xl sm:text-2xl font-bold tracking-tight bg-gradient-to-r from-violet-300 via-fuchsia-200 to-cyan-200 bg-clip-text text-transparent group-hover:from-white group-hover:via-violet-200 group-hover:to-cyan-100 transition-all duration-300">
          edwin
        </span>
        <span
          class="hidden sm:inline-flex h-8 items-center rounded-lg border border-white/10 bg-white/5 px-2.5 font-mono text-[10px] font-medium uppercase tracking-widest text-slate-400 group-hover:border-violet-400/30 group-hover:text-slate-200 transition-colors">
          EM
        </span>
      </button>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-0.5">
        <ng-container *ngFor="let item of navLinks">
          <button
            type="button"
            (click)="scrollTo(item.anchor)"
            class="px-3.5 py-2 text-sm font-medium text-slate-300 hover:text-white rounded-lg hover:bg-white/5 transition-all duration-200 tracking-wide">
            {{ lang.t(item.key) }}
          </button>
        </ng-container>
      </div>

      <!-- Right -->
      <div class="flex items-center gap-2 sm:gap-3">
        <button
          type="button"
          (click)="lang.toggle()"
          class="hidden sm:inline-flex items-center gap-1.5 rounded-full border border-white/15 bg-white/5 px-3.5 py-1.5 text-xs font-bold uppercase tracking-wider text-slate-200 hover:border-cyan-400/40 hover:text-cyan-200 transition-all duration-200">
          {{ lang.nextLabel }}
        </button>

        <button
          type="button"
          (click)="scrollTo('contact')"
          class="hidden md:inline-flex items-center rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 px-5 py-2 text-sm font-semibold text-white shadow-md shadow-violet-900/40 transition-all duration-200 hover:from-violet-500 hover:to-fuchsia-500 hover:shadow-lg hover:shadow-violet-800/30">
          {{ lang.t('nav.contact') }}
        </button>

        <button
          type="button"
          (click)="menuOpen = !menuOpen"
          class="md:hidden rounded-lg border border-white/10 p-2 text-slate-200 hover:bg-white/5 hover:text-white transition-colors"
          [attr.aria-expanded]="menuOpen"
          aria-label="Menú">
          <svg *ngIf="!menuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg *ngIf="menuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile -->
    <div *ngIf="menuOpen" class="md:hidden border-t border-white/10 py-3 space-y-0.5 bg-slate-950/98">
      <ng-container *ngFor="let item of navLinks">
        <button
          type="button"
          (click)="scrollTo(item.anchor)"
          class="w-full text-left px-4 py-3 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/5 rounded-lg transition-all">
          {{ lang.t(item.key) }}
        </button>
      </ng-container>
      <div class="flex gap-2 px-4 pt-3">
        <button type="button" (click)="lang.toggle()"
          class="flex-1 rounded-full border border-white/15 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-200 hover:bg-white/5">
          {{ lang.nextLabel }}
        </button>
        <button type="button" (click)="scrollTo('contact')"
          class="flex-1 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 py-2.5 text-center text-sm font-semibold text-white">
          {{ lang.t('nav.contact') }}
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="h-16" aria-hidden="true"></div>

<!-- Navigation — Dark Tech Portfolio -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-[#0B0F19]/90 backdrop-blur-md border-b border-gray-800 transition-all duration-300">
  <div class="max-w-6xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Brand -->
      <button (click)="scrollTo('')" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center group-hover:bg-blue-500 transition-colors">
          <span class="text-white font-bold text-xs tracking-widest">EM</span>
        </div>
        <span class="text-gray-200 font-semibold text-sm hidden sm:block group-hover:text-white transition-colors">Edwin Marquez</span>
      </button>

      <!-- Desktop nav links -->
      <div class="hidden md:flex items-center gap-1">
        <ng-container *ngFor="let item of navLinks">
          <button
            (click)="scrollTo(item.anchor)"
            class="px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-all duration-200 font-medium">
            {{ lang.t(item.key) }}
          </button>
        </ng-container>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-3">
        <!-- Lang toggle -->
        <button
          (click)="lang.toggle()"
          class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold text-gray-400 hover:text-blue-400 border border-gray-700 hover:border-blue-500 rounded-full transition-all duration-200 uppercase tracking-wider">
          {{ lang.nextLabel }}
        </button>

        <!-- Contact CTA -->
        <button
          (click)="scrollTo('contact')"
          class="hidden md:block px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors duration-200">
          {{ lang.t('nav.contact') }}
        </button>

        <!-- Mobile hamburger -->
        <button
          (click)="menuOpen = !menuOpen"
          class="md:hidden p-2 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-colors">
          <svg *ngIf="!menuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg *ngIf="menuOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="menuOpen" class="md:hidden border-t border-gray-800 py-4 space-y-1">
      <ng-container *ngFor="let item of navLinks">
        <button
          (click)="scrollTo(item.anchor)"
          class="w-full text-left px-4 py-3 text-sm text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
          {{ lang.t(item.key) }}
        </button>
      </ng-container>
      <div class="pt-3 flex items-center gap-3 px-4">
        <button (click)="lang.toggle()" class="flex-1 py-2 text-xs font-bold text-gray-400 border border-gray-700 rounded-full uppercase tracking-wider">
          {{ lang.nextLabel }}
        </button>
        <button (click)="scrollTo('contact')" class="flex-1 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg text-center">
          {{ lang.t('nav.contact') }}
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Spacer to compensate fixed nav height -->
<div class="h-16"></div>

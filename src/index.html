  <!-- Initialize uiOptions accessibility panel -->
  <script type="text/javascript">
    $(document).ready(function () {
      fluid.uiOptions.prefsEditor(".flc-prefsEditor-separatedPanel", {
        lazyLoad: true,
        terms: {
          "templatePrefix": "assets/uiOptions/framework/preferences/html",
          "messagePrefix": "assets/uiOptions/framework/preferences/messages"
        },
        "tocTemplate": "assets/uiOptions/components/tableOfContents/html/TableOfContents.html",

          "overviewPanel": ".flc-overviewPanel"
        }
      });
    });
